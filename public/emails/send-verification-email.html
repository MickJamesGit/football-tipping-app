<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm your email</title>
    <!-- Link to Google Fonts for Lusitana -->
    <link
      href="https://fonts.googleapis.com/css2?family=Lusitana:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
        color: #333;
      }

      .email-container {
        max-width: 600px;
        margin: 0 auto;
        background-color: #ffffff;
        border: 1px solid #e0e0e0;
      }

      .email-header {
        background-color: #151a2d; /* Replace with your bg-primary color */
        padding: 20px 0; /* Adjusted padding to remove extra bottom space */
        text-align: center;
        color: #ffffff; /* Set text color for the header only */
      }

      .email-body {
        padding: 20px;
        color: #333; /* Reset text color for the body */
        background-color: #ffffff; /* Ensure body background is white */
      }

      .email-footer {
        background-color: #151a2d; /* Replace with your bg-primary color */
        color: #ffffff; /* Set text color for the footer only */
        text-align: center;
        padding: 10px 20px;
        font-size: 12px;
      }

      .email-footer a {
        color: #ffffff;
        text-decoration: none;
      }

      .email-footer p {
        margin: 0;
      }

      .logo {
        font-family: "Lusitana", serif;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 0; /* Remove bottom margin to fix extra padding */
      }

      .logo p {
        font-size: 32px;
        font-weight: bold;
        margin: 0;
        display: flex;
        align-items: center;
      }

      .text-yellow {
        color: #fbbf24; /* Corrected color for the yellow text */
      }

      .text-white {
        color: #ffffff;
      }
    </style>
  </head>

  <body>
    <div class="email-container">
      <!-- Header with logo -->
      <div class="email-header">
        <!-- Logo with trophy icon -->
        <div class="logo">
          <!-- Trophy SVG icon -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="32px"
            height="32px"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#fbbf24"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="min-width: 30px; min-height: 30px; margin-right: 8px"
          >
            <circle cx="12" cy="8" r="7" />
            <polyline points="8.21 13.89 7 23 12 20.65 17 23 15.79 13.88" />
          </svg>

          <p style="margin: 0">
            <span class="text-white">Footy</span>
            <span class="text-yellow">Tippers</span>
          </p>
        </div>
      </div>

      <!-- Main content -->
      <div class="email-body">
        <h2>Confirm Your Email Address</h2>
        <p>
          To complete your registration and verify your email address, please
          click
          <a href="{confirmLink}" style="color: #0056b3">here</a>.
        </p>
        <p>If you did not request this email, please ignore it.</p>
      </div>

      <!-- Footer -->
      <div class="email-footer">
        <p>&copy; 2026 Footy Tippers. All rights reserved.</p>
        <p>
          <a href="https://yourcompany.com/terms">Terms of Use</a> |
          <a href="https://yourcompany.com/privacy">Privacy Policy</a>
        </p>
      </div>
    </div>
  </body>
</html>
